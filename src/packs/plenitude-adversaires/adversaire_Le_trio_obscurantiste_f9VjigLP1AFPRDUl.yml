name: Le trio obscurantiste
type: adversaire
_id: f9VjigLP1AFPRDUl
img: systems/penombre/assets/scenarios/plenitude/portraits/P_trio-obscur.webp
system:
  details: >-
    <p><span class="fontstyle0">Le groupe comprend trois
    membres.</span></p><ul><li><p><span class="fontstyle3">Holst </span><span
    class="fontstyle0">est un vieux mage blasé qui, par lassitude, ne pratique
    quasiment plus son art. Il use de ses relations pour trouver des ressources
    pour ses compères, en particulier des danseurs.</span></p></li><li><p><span
    class="fontstyle3">Bellicène </span><span class="fontstyle0">est un marchand
    sadique converti à l’obscurantisme. Inféodé à l’Esthète, une
    princesse-marchande connue pour ses méthodes vicieuses, il fait tout pour
    lui plaire et a plusieurs fois accompli ses basses
    besognes.</span></p></li><li><p><span class="fontstyle3">Anténidal
    </span><span class="fontstyle0">est une jeune idéaliste qui idolâtre un
    passé qu’elle n’a pas connu.</span></p></li></ul><p><span
    class="fontstyle0">Ensemble, ils se sont mis en quête du mouvement perpétuel
    et travaillent à une mélodie capable de faire évoluer leurs danseurs dans un
    ballet sans fin. Ils cherchent un accordé pour tester leurs théories. En
    attendant, ils effectuent diverses tâches pour le compte de
    l’Esthète.</span></p><p><span class="fontstyle0">Ils partagent un sous-sol
    humide desservi par un unique escalier extérieur et une lourde porte cloutée
    que l’Esthète leur a « généreusement » mis à disposition – un moyen de
    garder une forme de pression sur eux. Des matelas ont été installés dans les
    alcôves de l’unique pièce, à la fois lieu de vie et laboratoire. L’endroit
    est éclairé par un soupirail trop étroit pour laisser passer un
    gnome.</span></p>
