name: Mandigo
type: adversaire
_id: Aq5GVU64HvTEIvIx
img: systems/penombre/assets/scenarios/plenitude/portraits/mandigo.webp
system:
  details: >-
    <p><span class="fontstyle0">Mandigo est l’un des trois obscurantistes
    responsables de l’invasion janrénienne de l’Urguemand. Agone réussit
    cependant à les identifier, tue Diphome et emprisonne les deux autres dans
    le souffrejour naissant. Mais il libère Mandigo pour une dernière mission
    qu’il n’est pas en position de refuser. À jamais transformé par l’arbre noir
    et la volonté d’Agone, le mage est une nouvelle version de lui-même, ce dont
    il n’a alors pas vraiment conscience. Mandigo est cependant tout sauf idiot
    et, pour l’Allégeance au crépuscule, le sort que lui demande Agone, il
    réclame du sang de Cyriaque pour le lier à celui de son danseur « en vue
    d’en renforcer les effets ». Il utilise en réalité ce sang pour piéger le
    sort : s’il venait à décéder, Cyriaque le suivrait dans la tombe. Agone est
    donc obligé de le laisser en vie. Mandigo est enfermé plusieurs années, puis
    déplacé en dehors de Lorgol et finalement ramené dans la capitale urguemande
    pour être plus facile à protéger – et à surveiller.</span></p><p><span
    class="fontstyle0">Mandigo profite depuis d’une vie discrète, sort surtout
    la nuit, noue quelques relations avec des gens qui ne se doutent pas de son
    identité. Il développe aussi une relation particulière avec son dernier
    danseur, vestige de sa gloire passée, seul être qui le relie à son identité
    brisée. Lorsqu’il est contraint de le sacrifier pour fuir la rue du Pot
    d’Étain, la vengeance devient son unique horizon – à moins que quelqu’un ne
    lui propose un autre avenir ?</span></p><p><span class="fontstyle0">Déjà
    frêle il y a vingt ans, Mandigo ressemble désormais à un vieillard décharné.
    Des rides ont creusé la peau ternie de son visage. Son regard adouci, qui
    semble presque s’excuser, lui donne un air inoffensif. Pourtant, il y a ce
    pli qui barre son front et trahit une acuité et une dureté qui ne demandent
    qu’à reprendre le dessus.</span></p>
