  - type: intrigue
    name: Une passion secrète
    _id: 2OnHyMh91ruGWYHX
    img: systems/penombre/assets/icons/intrigue.webp
    system:
      description: >-
        <p><span class="fontstyle0">Verizon, enchaîné à sa mission depuis des
        années, apprécie la compagnie des opalins de la Romance qu’il félicite
        d’avoir su briser leur lien avec les Abysses. Il ne fait jamais rien qui
        puisse leur nuire et porte à leur attention tout danger qui les
        menacerait. Ce qu’il ignore, c’est qu’il a lui aussi fini par susciter
        un amour secret, depuis le temps qu’il traîne dans Lorgol.</span></p>
