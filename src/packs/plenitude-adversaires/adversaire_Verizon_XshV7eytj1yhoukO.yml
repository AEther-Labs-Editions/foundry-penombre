    name: Une connivence à mon idée
    _id: tHcsXWsXWswUxI8D
    img: systems/penombre/assets/icons/intrigue.webp
    system:
      description: >-
        <p><span class="fontstyle0">Verizon a pris goût à Lorgol et espère
