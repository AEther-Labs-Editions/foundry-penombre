system:
  details: >-
    <p><span class="fontstyle0">Podéral d’Emnos a réussi à s’attacher la
    fidélité de Harpelle en manipulant les circonstances de sa mort. Sa famille
    se dédiait à la reliure d’ouvrages de collection pour le compte de l’échevin
    – leur client principal, un érudit discret et exigent, mais généreux, qui
    rendait fréquemment visite à leur atelier des Berges et louait la qualité de
    son travail d’apprentie. Sa famille et elle furent victimes d’une ogresse
    qui s’introduisit dans leur demeure, les tortura, puis les exécuta « pour
    obtenir des informations sur l’échevin et les derniers ouvrages qu’il leur
    avait confiés ». Ce traumatisme fit de Harpelle une banshee dont le premier
    souffle fut recueilli par Podéral d’Emnos. L’échevin l’aida à retrouver
    l’assassin et à assouvir sa vengeance, puis lui offrit de rester à son
    service. Harpelle n’apprit jamais qu’il avait lui-même commandité son
    assassinat et celui de ses parents, se débarrassant au passage de l’ogresse,
    une damne devenue trop encombrante.</span></p><p><span
    class="fontstyle0">Depuis, Harpelle affine ses talents, entretient la
    bibliothèque de son mentor et se sert de sa couverture d’érudite pour
    espionner les ennemis de l’échevin. Il l’a chargée d’identifier des
    étudiants ou membres du personnel du collège du Souffre-jour qui pourraient
    lui permettre de mieux anticiper les décisions des psycholunes et du
    principal.</span></p><p><span class="fontstyle0">Harpelle éprouve une
    jalousie maladive envers les autres damnes qui accaparent son mentor. Ne
    sont-elles pas plus belles, plus douées et plus utiles qu’elle ? Plus…
    vivantes, aussi, telle Férale, cette boule sensuelle d’espièglerie et de
    fraîcheur qui s’est ridiculement entichée de l’échevin ?</span></p><p><span
    class="fontstyle0">La banshee est une femme pâle aux traits creusés. Elle
    semble avoir vingt ans – l’âge de sa mort. Vêtue d’une tunique très proche
    du corps et de collants noirs recouverts d’une mante aussi fine qu’un voile,
    elle fréquente les Échos mélodiques depuis quelques mois et s’est attiré
    beaucoup d’amitiés malgré – ou à cause de – son étrangeté.</span></p>
