name: Férale
type: adversaire
_id: kma6hCJPNtHgSfiQ
img: systems/penombre/assets/scenarios/echos-melodiques/portraits/ferale.webp
system:
  details: >-
    <p><span class="fontstyle0">Férale est la dernière des damnes de l’échevin
    des Mille Tours. Ces femmes sont ses agents d’élites, qu’il utilise et
    manipule pour toutes sortes de missions hors des canaux officiels. Il l’a
    séduite durant une soirée mondaine où elle s’ennuyait à périr dans l’escorte
    d’un prince-marchand. Podéral d’Emnos lui a proposé une vie d’aventures et
    de missions flamboyantes dont elle s’acquitte avec talent, espérant qu’il
    lui offrira toujours de nouveaux défis. Dans les Échos mélodiques et la
    maladrerie, elle est en concurrence avec Harpelle pour espionner le collège
    du Souffre-jour.</span></p><p><span class="fontstyle0">Férale est une
    escrimeuse provocatrice et extravertie, séduisante, solaire. Elle promène
    avec orgueil sa crinière d’un roux flamboyant. Elle pose son regard vert,
    interrogateur et joueur sur ses interlocutrices et interlocuteurs. La
    finesse n’est pas sa spécialité : elle prend ce qu’elle veut, quand elle le
    veut.</span></p>
